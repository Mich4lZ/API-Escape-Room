services:
  postgres:
    image: postgres:16
    container_name: escape_room_db
    restart: unless-stopped
    ports:
      - '6767:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escape_room
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
